<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Stok Warung UMKM</title>

<link rel="manifest" href="manifest.json" />

<style>
:root{
  --primary:#1f5e7a;        /* biru UMKM */
  --primary-2:#2f7fa3;
  --accent:#28a745;         /* hijau */
  --danger:#dc3545;         /* merah */
  --bg:#f3f6fb;
  --card:#ffffff;
  --text:#1f2937;
  --muted:#6b7280;
  --radius:16px;
}

*{box-sizing:border-box}

body{
  margin:0;
  font-family: 'Segoe UI', system-ui, -apple-system, Arial, sans-serif;
  color:var(--text);
  background:var(--bg);
}

/* ===== HEADER / HERO ===== */
.hero{
  background: radial-gradient(1200px 300px at 50% -50%, #ffffffaa, transparent),
              linear-gradient(180deg, var(--primary), var(--primary-2));
  color:#fff;
  padding:22px 16px 26px;
  border-bottom-left-radius:22px;
  border-bottom-right-radius:22px;
  box-shadow:0 8px 20px rgba(0,0,0,.15);
  text-align:center;
}
.hero img{
  width:120px;
  height:auto;
  display:block;
  margin:0 auto 8px;
  filter: drop-shadow(0 4px 10px rgba(0,0,0,.25));
}
.hero h1{
  margin:6px 0 0;
  font-size:20px;
  font-weight:700;
  letter-spacing:.2px;
}

/* ===== CONTAINER ===== */
.container{
  max-width:520px;
  margin:-18px auto 20px; /* overlap ke hero */
  padding:0 12px;
}

/* ===== CARD ===== */
.card{
  background:var(--card);
  border-radius:var(--radius);
  padding:14px;
  box-shadow:0 10px 20px rgba(0,0,0,.08);
}

/* ===== FORM GRID ===== */
.grid{
  display:grid;
  grid-template-columns:1fr;
  gap:10px;
}
@media(min-width:500px){
  .grid{ grid-template-columns:1fr 1fr; }
}
.full{ grid-column:span 2; }

/* ===== INPUT ===== */
input, select{
  width:100%;
  padding:14px;
  border-radius:14px;
  border:1px solid #e5e7eb;
  background:#fafafa;
  font-size:15px;
  outline:none;
  transition:.15s ease;
}
input:focus, select:focus{
  border-color:var(--primary-2);
  box-shadow:0 0 0 3px rgba(47,127,163,.12);
  background:#fff;
}

/* ===== BUTTONS ===== */
.btn{
  padding:14px;
  border-radius:14px;
  border:none;
  font-size:16px;
  color:#fff;
  cursor:pointer;
  transition:.15s ease;
}
.btn:active{ transform:scale(.98); }

.btn-primary{
  background:linear-gradient(135deg, #2fbf63, #1f9a4f);
  box-shadow:0 8px 16px rgba(40,167,69,.35);
}
.btn-secondary{
  background:#e5e7eb;
  color:#374151;
}
.btn-danger{
  background:var(--danger);
}

/* ===== SECTION TITLES ===== */
.section{
  margin-top:16px;
}
.section h3{
  margin:10px 2px;
  font-size:16px;
}

/* ===== ITEM CARD ===== */
.item{
  background:#fff;
  border-radius:14px;
  padding:12px;
  margin-top:10px;
  box-shadow:0 6px 14px rgba(0,0,0,.06);
  animation:fadeIn .25s ease;
}
@keyframes fadeIn{
  from{opacity:0; transform:translateY(6px)}
  to{opacity:1; transform:translateY(0)}
}

.row{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:10px;
}

.name{ font-weight:700; }

/* badge stok */
.badge{
  padding:6px 10px;
  border-radius:999px;
  font-weight:700;
  font-size:13px;
}
.badge.ok{
  background:#e7f7ee;
  color:#1f9a4f;
}
.badge.low{
  background:#fde8ea;
  color:#c0392b;
}

/* footer */
footer{
  text-align:center;
  font-size:12px;
  color:var(--muted);
  margin:18px 0 8px;
}
</style>
</head>

<body>

<!-- HERO -->
<div class="hero">
  <img src="logo.png" alt="Logo UMKM" />
  <h1>Stok Warung</h1>
</div>

<div class="container">

  <!-- FORM -->
  <div class="card">
    <div class="grid">
      <input id="nama" placeholder="Nama Barang" />
      <input id="jenis" placeholder="Jenis Barang" />

      <select id="tipe" class="full">
        <option value="masuk">Barang Masuk</option>
        <option value="keluar">Barang Keluar</option>
      </select>

      <input id="jumlah" type="number" placeholder="Jumlah" class="full" />

      <button class="btn btn-primary full" onclick="tambahData()">Simpan</button>
      <button class="btn btn-secondary full" onclick="resetData()">Reset Semua</button>
    </div>
  </div>

  <!-- STOK -->
  <div class="section">
    <h3>📊 Stok</h3>
    <div id="stokList"></div>
  </div>

  <!-- RIWAYAT -->
  <div class="section">
    <h3>📜 Riwayat</h3>
    <div id="riwayat"></div>
  </div>

  <footer>
    Web Stok Warung UMKM<br/>
    Oktavian Alyandra, S.Kom
  </footer>

</div>

<script>
let data = JSON.parse(localStorage.getItem("stok")) || [];

function hitungStok(){
  const stok = {};
  data.forEach(i=>{
    if(!stok[i.nama]) stok[i.nama]=0;
    if(i.tipe==="masuk") stok[i.nama]+=i.jumlah;
    else stok[i.nama]-=i.jumlah;
  });
  return stok;
}

function render(){
  const stokData = hitungStok();
  const stokList = document.getElementById("stokList");
  const riwayat = document.getElementById("riwayat");

  stokList.innerHTML = "";
  riwayat.innerHTML = "";

  Object.keys(stokData).forEach(nama=>{
    const val = stokData[nama];
    const cls = val>0 ? "ok" : "low";
    stokList.innerHTML += `
      <div class="item">
        <div class="row">
          <div class="name">${nama}</div>
          <div class="badge ${cls}">Stok: ${val}</div>
        </div>
      </div>
    `;
  });

  data.slice().reverse().forEach((i, idx)=>{
    const realIndex = data.length-1-idx;
    riwayat.innerHTML += `
      <div class="item">
        <div class="name">${i.nama}</div>
        <div style="color:#6b7280; margin-top:4px;">
          ${i.jenis} • ${i.tanggal}
        </div>
        <div style="margin-top:6px;">
          ${i.tipe} : ${i.jumlah}
        </div>
        <button class="btn btn-danger" style="margin-top:8px"
          onclick="hapusItem(${realIndex})">Hapus</button>
      </div>
    `;
  });
}

function tambahData(){
  const nama = document.getElementById("nama").value.trim();
  const jenis = document.getElementById("jenis").value.trim();
  const tipe = document.getElementById("tipe").value;
  const jumlah = parseInt(document.getElementById("jumlah").value);
  const tanggal = new Date().toLocaleDateString();

  if(!nama || !jumlah){ alert("Isi data dulu!"); return; }

  const stok = hitungStok();
  if(tipe==="keluar"){
    if(!stok[nama] || stok[nama] < jumlah){
      alert("Stok tidak cukup!");
      return;
    }
  }

  data.push({nama, jenis, tipe, jumlah, tanggal});
  localStorage.setItem("stok", JSON.stringify(data));

  // clear input
  document.getElementById("nama").value="";
  document.getElementById("jenis").value="";
  document.getElementById("jumlah").value="";

  render();
}

function hapusItem(i){
  if(confirm("Hapus data ini?")){
    data.splice(i,1);
    localStorage.setItem("stok", JSON.stringify(data));
    render();
  }
}

function resetData(){
  if(confirm("Hapus semua data?")){
    localStorage.removeItem("stok");
    data=[];
    render();
  }
}

render();

if('serviceWorker' in navigator){
  navigator.serviceWorker.register('service-worker.js');
}
</script>

</body>
</html>
