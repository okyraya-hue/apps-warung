<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stok Warung</title>

<link rel="manifest" href="manifest.json">

<!-- Tailwind -->
<script src="https://cdn.tailwindcss.com"></script>

<!-- Font -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body {
  font-family: 'Poppins', sans-serif;
}
</style>
</head>

<body class="bg-gradient-to-br from-purple-600 to-indigo-700 min-h-screen p-4 text-white">

<!-- HEADER -->
<div class="text-center mb-4">
  <img src="logo.png" class="w-52 mx-auto mb-2">
  <h1 class="text-xl font-semibold">📦 Stok Warung UMKM</h1>
</div>

<!-- FORM -->
<div class="bg-white text-gray-800 p-4 rounded-2xl shadow-lg max-w-xl mx-auto">

  <div class="grid grid-cols-2 gap-3">

    <input id="nama" placeholder="Nama Barang"
      class="col-span-1 p-3 rounded-xl border bg-gray-50">

    <input id="jenis" placeholder="Jenis Barang"
      class="col-span-1 p-3 rounded-xl border bg-gray-50">

    <select id="tipe"
      class="col-span-2 p-3 rounded-xl border bg-gray-50">
      <option value="masuk">Barang Masuk</option>
      <option value="keluar">Barang Keluar</option>
    </select>

    <input id="jumlah" type="number" placeholder="Jumlah"
      class="col-span-2 p-3 rounded-xl border bg-gray-50">

    <button onclick="tambahData()"
      class="col-span-2 bg-green-600 hover:bg-green-700 text-white py-3 rounded-xl transition transform hover:scale-105">
      Simpan
    </button>

    <button onclick="resetData()"
      class="col-span-2 bg-gray-300 hover:bg-gray-400 text-gray-800 py-3 rounded-xl">
      Reset Semua
    </button>

  </div>
</div>

<!-- STOK -->
<div class="max-w-xl mx-auto mt-5">
  <h3 class="mb-2 font-semibold">📦 Stok</h3>
  <div id="stokList" class="space-y-2"></div>
</div>

<!-- RIWAYAT -->
<div class="max-w-xl mx-auto mt-5">
  <h3 class="mb-2 font-semibold">📜 Riwayat</h3>
  <div id="riwayat" class="space-y-2"></div>
</div>

<!-- FOOTER -->
<footer class="text-center text-sm mt-6 opacity-80">
  Web Stok Warung UMKM<br>
  Oktavian Alyandra, S.Kom
</footer>

<script>
let data = JSON.parse(localStorage.getItem("stok")) || [];

function hitungStok() {
  let stok = {};
  data.forEach(item => {
    if (!stok[item.nama]) stok[item.nama] = 0;
    if (item.tipe === "masuk") stok[item.nama] += item.jumlah;
    else stok[item.nama] -= item.jumlah;
  });
  return stok;
}

function render() {
  let stokData = hitungStok();
  let stokList = document.getElementById("stokList");
  let riwayat = document.getElementById("riwayat");

  stokList.innerHTML = "";
  riwayat.innerHTML = "";

  for (let nama in stokData) {
    stokList.innerHTML += `
      <div class="bg-white text-gray-800 p-4 rounded-xl shadow flex justify-between">
        <b>${nama}</b>
        <span class="font-semibold text-green-600">Stok: ${stokData[nama]}</span>
      </div>
    `;
  }

  data.slice().reverse().forEach((item, index) => {
    riwayat.innerHTML += `
      <div class="bg-white text-gray-800 p-4 rounded-xl shadow">
        <b>${item.nama}</b><br>
        <span class="text-sm text-gray-500">${item.jenis} • ${item.tanggal}</span><br>
        <span class="${item.tipe === 'masuk' ? 'text-green-600' : 'text-red-500'} font-semibold">
          ${item.tipe} : ${item.jumlah}
        </span><br><br>

        <button onclick="hapusItem(${data.length - 1 - index})"
          class="bg-red-500 hover:bg-red-600 text-white px-3 py-1 rounded-lg">
          Hapus
        </button>
      </div>
    `;
  });
}

function tambahData() {
  let nama = document.getElementById("nama").value;
  let jenis = document.getElementById("jenis").value;
  let tipe = document.getElementById("tipe").value;
  let jumlah = parseInt(document.getElementById("jumlah").value);
  let tanggal = new Date().toLocaleDateString();

  if (!nama || !jumlah) {
    alert("Isi data dulu!");
    return;
  }

  let stok = hitungStok();

  if (tipe === "keluar") {
    if (!stok[nama] || stok[nama] < jumlah) {
      alert("Stok tidak cukup!");
      return;
    }
  }

  data.push({ nama, jenis, tipe, jumlah, tanggal });
  localStorage.setItem("stok", JSON.stringify(data));
  render();
}

function hapusItem(index) {
  if (confirm("Hapus data ini?")) {
    data.splice(index, 1);
    localStorage.setItem("stok", JSON.stringify(data));
    render();
  }
}

function resetData() {
  if (confirm("Hapus semua data?")) {
    localStorage.removeItem("stok");
    data = [];
    render();
  }
}

render();

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('service-worker.js');
}
</script>

</body>
</html>
