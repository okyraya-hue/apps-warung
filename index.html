<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stok Warung</title>

<link rel="manifest" href="manifest.json">

<style>
body {
  font-family: 'Segoe UI', sans-serif;
  background: #eef2f7;
  margin: 0;
  padding: 10px;
}

h2 {
  text-align: center;
  font-size: 20px;
}

h3 {
  margin-top: 15px;
  font-size: 16px;
}

.card {
  background: #fff;
  padding: 12px;
  border-radius: 12px;
  box-shadow: 0 2px 6px rgba(0,0,0,0.1);
  margin-bottom: 10px;
}

/* Biar tidak terlalu lebar di HP */
.container {
  max-width: 500px;
  margin: auto;
}

/* Input rapi */
input, select {
  width: 100%;
  padding: 12px;
  margin-top: 8px;
  border-radius: 8px;
  border: 1px solid #ccc;
  font-size: 14px;
}

/* Tombol besar (enak ditekan jempol) */
button {
  width: 100%;
  padding: 14px;
  margin-top: 10px;
  border-radius: 10px;
  background: #28a745;
  color: white;
  font-size: 16px;
  border: none;
}

/* List */
.item {
  background: white;
  padding: 10px;
  border-radius: 10px;
  margin-top: 8px;
  box-shadow: 0 1px 4px rgba(0,0,0,0.1);
}

/* Stok besar */
.stok {
  font-size: 18px;
  font-weight: bold;
  color: #28a745;
}

/* RESPONSIVE (HP banget) */
.row {
  display: flex;
  flex-direction: column; /* penting biar tidak berantakan */
}
</style>
</head>

<body>

<div class="container">

<h2>📦 Stok Warung</h2>

<div class="card">

  <div class="row">
    <input id="nama" placeholder="Nama Barang">
    <input id="jenis" placeholder="Jenis Barang">
  </div>
  
  <select id="tipe">
    <option value="masuk">Barang Masuk</option>
    <option value="keluar">Barang Keluar</option>
  </select>

  <input id="jumlah" type="number" placeholder="Jumlah">
  
  <button onclick="tambahData()">Simpan</button>
</div>

<h3>📊 Stok Saat Ini</h3>
<div id="stokList"></div>

<h3>📜 Riwayat</h3>
<div id="riwayat"></div>

</div>

<script>
let data = JSON.parse(localStorage.getItem("stok")) || [];

function hitungStok() {
  let stok = {};
  data.forEach(item => {
    if (!stok[item.nama]) stok[item.nama] = 0;
    if (item.tipe === "masuk") stok[item.nama] += item.jumlah;
    else stok[item.nama] -= item.jumlah;
  });
  return stok;
}

function render() {
  let stokData = hitungStok();
  let stokList = document.getElementById("stokList");
  let riwayat = document.getElementById("riwayat");

  stokList.innerHTML = "";
  riwayat.innerHTML = "";

  for (let nama in stokData) {
    stokList.innerHTML += `
      <div class="item">
        <b>${nama}</b><br>
        <span class="stok">Stok: ${stokData[nama]}</span>
      </div>
    `;
  }

  data.slice().reverse().forEach(item => {
    riwayat.innerHTML += `
      <div class="item">
        <b>${item.nama}</b><br>
        ${item.jenis} | ${item.tanggal}<br>
        ${item.tipe} : ${item.jumlah}
      </div>
    `;
  });
}

function tambahData() {
  let nama = document.getElementById("nama").value;
  let jenis = document.getElementById("jenis").value;
  let tipe = document.getElementById("tipe").value;
  let jumlah = parseInt(document.getElementById("jumlah").value);
  let tanggal = new Date().toLocaleDateString();

  if (!nama || !jumlah) {
    alert("Isi data dulu!");
    return;
  }

  let stok = hitungStok();

  if (tipe === "keluar") {
    if (!stok[nama] || stok[nama] < jumlah) {
      alert("Stok tidak cukup!");
      return;
    }
  }

  data.push({ nama, jenis, tipe, jumlah, tanggal });
  localStorage.setItem("stok", JSON.stringify(data));
  render();
}

render();

// offline
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('service-worker.js');
}
</script>

</body>
</html>
