<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stok Warung</title>

<link rel="manifest" href="manifest.json">

<style>
body {
  font-family: 'Segoe UI', sans-serif;
  background: #f5f7fb;
  margin: 0;
  padding: 12px;
}

.container {
  max-width: 500px;
  margin: auto;
}

h2 {
  text-align: center;
}

h3 {
  margin-top: 20px;
}

/* CARD */
.card {
  background: #fff;
  padding: 15px;
  border-radius: 15px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.08);
}

/* GRID FORM */
.grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}

/* FULL WIDTH */
.full {
  grid-column: span 2;
}

/* INPUT */
input, select {
  width: 100%;
  padding: 12px;
  border-radius: 10px;
  border: 1px solid #ddd;
  font-size: 14px;
}

/* BUTTON */
button {
  padding: 14px;
  border-radius: 12px;
  background: #28a745;
  color: white;
  font-size: 16px;
  border: none;
}

/* ITEM */
.item {
  background: white;
  padding: 12px;
  border-radius: 12px;
  margin-top: 10px;
}

/* STOK */
.stok {
  font-weight: bold;
  color: green;
}

/* FOOTER */
footer {
  text-align: center;
  font-size: 12px;
  margin-top: 20px;
  color: #777;
}
</style>
</head>

<body>

<div class="container">

<h2>📦 Stok Warung</h2>

<div class="card">

  <div class="grid">
    <input id="nama" placeholder="Nama Barang">
    <input id="jenis" placeholder="Jenis Barang">

    <select id="tipe" class="full">
      <option value="masuk">Barang Masuk</option>
      <option value="keluar">Barang Keluar</option>
    </select>

    <input id="jumlah" type="number" placeholder="Jumlah" class="full">

    <button onclick="tambahData()" class="full">Simpan</button>
  </div>

</div>

<h3>📊 Stok</h3>
<div id="stokList"></div>

<h3>📜 Riwayat</h3>
<div id="riwayat"></div>

<footer>
  Web Stok Warung UMKM<br>
  Oktavian Alyandra, S.Kom
</footer>

</div>

<script>
let data = JSON.parse(localStorage.getItem("stok")) || [];

function hitungStok() {
  let stok = {};
  data.forEach(item => {
    if (!stok[item.nama]) stok[item.nama] = 0;
    if (item.tipe === "masuk") stok[item.nama] += item.jumlah;
    else stok[item.nama] -= item.jumlah;
  });
  return stok;
}

function render() {
  let stokData = hitungStok();
  let stokList = document.getElementById("stokList");
  let riwayat = document.getElementById("riwayat");

  stokList.innerHTML = "";
  riwayat.innerHTML = "";

  for (let nama in stokData) {
    stokList.innerHTML += `
      <div class="item">
        <b>${nama}</b><br>
        <span class="stok">Stok: ${stokData[nama]}</span>
      </div>
    `;
  }

  data.slice().reverse().forEach(item => {
    riwayat.innerHTML += `
      <div class="item">
        <b>${item.nama}</b><br>
        ${item.jenis} • ${item.tanggal}<br>
        ${item.tipe} : ${item.jumlah}
      </div>
    `;
  });
}

function tambahData() {
  let nama = document.getElementById("nama").value;
  let jenis = document.getElementById("jenis").value;
  let tipe = document.getElementById("tipe").value;
  let jumlah = parseInt(document.getElementById("jumlah").value);
  let tanggal = new Date().toLocaleDateString();

  if (!nama || !jumlah) {
    alert("Isi data dulu!");
    return;
  }

  let stok = hitungStok();

  if (tipe === "keluar") {
    if (!stok[nama] || stok[nama] < jumlah) {
      alert("Stok tidak cukup!");
      return;
    }
  }

  data.push({ nama, jenis, tipe, jumlah, tanggal });
  localStorage.setItem("stok", JSON.stringify(data));
  render();
}

render();

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('service-worker.js');
}
</script>

</body>
</html>
